<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Akademik — Prodi TIF UNIPMA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Pangolin&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="nav-menu">
        <a href="#">Cara Penggunaan</a>
        <a href="#">Pengaduan</a>
        <a href="/chatbot" class="btn-chat">Chatbot</a>
      </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
      <!-- Awan -->
      <img
        src="{{ url_for('static', filename='images/cloud.png') }}"
        class="cloud"
      />

      <!-- KIRI -->
      <div class="hero-left">
        <div class="text-wrapper">
          <img
            src="{{ url_for('static', filename='images/text.png') }}"
            class="text-img"
          />
          <div class="text-content">
            <h1>
              Halo <br />
              Mahasiswa <br />
              TIF! <br />
            </h1>
            <p>
              Selamat datang di Chatbot Akademik. <br />
              Silakan ajukan pertanyaan terkait kegiatan akademik <br />
              seperti jadwal kuliah, panduan skripsi, pengisian KRS, <br />
              dan informasi lainnya.
            </p>
          </div>
        </div>
      </div>

      <!-- KANAN -->
      <div class="hero-right">
        <div class="character-wrapper">
          <!-- <img
            src="{{ url_for('static', filename='images/character.png') }}"
            class="character"
          /> -->
          <div class="bubble-cloud bubble1">
            <img
              src="{{ url_for('static', filename='images/bubble-cloud.png') }}"
            />
            <span
              >Syarat <br />
              Skripsi</span
            >
          </div>
          <div class="bubble-cloud bubble2">
            <img
              src="{{ url_for('static', filename='images/bubble-cloud.png') }}"
            />
            <span
              >Pedoman <br />
              Magang</span
            >
          </div>
          <div class="bubble-cloud bubble3">
            <img
              src="{{ url_for('static', filename='images/bubble-cloud.png') }}"
            />
            <span
              >Jadwal <br />
              Mata <br />
              Kuliah</span
            >
          </div>
          <a href="/chatbot" class="cta-button">Yuk Tanya Chatbot!</a>
        </div>
      </div>
    </section>
  </body>
</html>
